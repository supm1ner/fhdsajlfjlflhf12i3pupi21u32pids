name: sunrise_messenger
description: Sunrise — minimalist liquid-glass messenger for mobile and desktop.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3   # Sunrise/Tinode WebSocket transport
  crypto: ^3.0.3               # PKCE code challenge for SSO
  url_launcher: ^6.2.5         # open the SSO provider in the system browser
  flutter_webrtc: ^1.3.0      # audio/video calls
  livekit_client: ^2.3.0       # SFU group calls (LiveKit)
  camera: ^0.11.0              # round video notes ("кружки")
  record: ^6.2.1               # voice messages
  image_picker: ^1.1.2         # photo attachments
  path_provider: ^2.1.3        # temp paths for recordings
  permission_handler: ^12.0.3  # camera/microphone permissions
  window_manager: ^0.5.1       # desktop window sizing (macOS/Windows/Linux)

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
