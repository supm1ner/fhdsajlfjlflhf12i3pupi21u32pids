# LiveKit server config (dev). API keys come from the LIVEKIT_KEYS env var
# (set by docker-compose from .env), so this file holds no secrets.
port: 7880
bind_addresses:
  - "0.0.0.0"
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
  # For LAN/remote access set use_external_ip: true (or node_ip to the host IP)
  # and publish the UDP port; localhost dev works as-is.
logging:
  level: info
  json: false
