            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
