        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: Create an account
      tags:
      - auth
  /auth/social/{provider}/callback:
    get:
      description: Validates the OAuth state cookie, exchanges the authorization code,
        resolves (or creates/links) the cotton-id account by verified email, establishes
        a session, then continues the OIDC login challenge or redirects to the SPA.
      parameters:
      - description: Social provider
        enum:
        - google
        - github
        - vk
        - yandex
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code from the provider
        in: query
        name: code
        required: true
        type: string
      - description: Anti-CSRF state echoed by the provider
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Redirect back into the OIDC flow or to the SPA
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: Social login callback
      tags:
      - social
  /auth/social/{provider}/start:
    get:
      description: Redirects the browser to the chosen provider's authorization endpoint.
