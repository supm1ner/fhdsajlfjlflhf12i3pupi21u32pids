      parameters:
      - description: Consent challenge to reject
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_oidc.consentRejectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_oidc.redirectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Reject an OIDC consent challenge
      tags:
      - oidc
  /oauth/login:
    get:
      description: Hydra redirects the browser here with a login_challenge. If the
        user already has a valid cotton-id session (or Hydra allows skip), the challenge
        is accepted immediately and the browser is sent back to Hydra. Otherwise the
        browser is redirected to the SPA sign-in page.
      parameters:
      - description: Hydra login challenge
        in: query
        name: login_challenge
        required: true
        type: string
      responses:
        "302":
          description: Redirect to Hydra (accepted) or to the SPA sign-in page
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: OIDC login entry (Hydra redirect target)
      tags:
      - oidc
  /oauth/login/accept:
    post:
      consumes:
      - application/json
      description: After the SPA has logged the user in, accepts the Hydra login challenge
        with the session's stable subject and returns the URL to navigate back to
        Hydra.
      parameters:
      - description: Login challenge to accept
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_oidc.loginAcceptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_oidc.redirectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Accept an OIDC login challenge
      tags:
      - oidc
  /oauth/login/reject:
    post:
      consumes:
      - application/json
      description: Cancels an in-progress sign-in, rejecting the Hydra login challenge
        with access_denied and returning the URL to send the user back to the relying
        party.
      parameters:
      - description: Login challenge to reject
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_oidc.loginRejectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_oidc.redirectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Reject an OIDC login challenge
      tags:
      - oidc
  /oauth/logout:
    get:
      description: Accepts Hydra's logout challenge, clears the cotton-id session,
        and redirects to the post-logout URL.
      parameters:
      - description: Hydra logout challenge
        in: query
        name: logout_challenge
        required: true
        type: string
      responses:
        "302":
          description: Redirect to Hydra post-logout URL
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: OIDC front-channel logout
      tags:
      - oidc
  /passkeys:
    get:
      description: Returns the current user's registered passkeys (id, nickname, created/last-used
        timestamps, transports). Requires an authenticated session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_passkey.listResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: List passkeys
      tags:
      - passkeys
  /passkeys/{id}:
    delete:
      description: Removes one of the current user's passkeys by its id. Returns 404
        if the passkey does not exist or belongs to another account. Requires an authenticated
        session.
      parameters:
      - description: Passkey id (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Delete a passkey
      tags:
      - passkeys
  /passkeys/register/begin:
    post:
      description: Returns WebAuthn CredentialCreationOptions for the current user,
        excluding their already-registered credentials, and sets the short-lived signed
        cid_wa ceremony cookie. Requires an authenticated session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.CredentialCreation'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Begin passkey registration
      tags:
      - passkeys
  /passkeys/register/finish:
    post:
      consumes:
      - application/json
      description: Verifies the authenticator's attestation against the cid_wa ceremony
        cookie and the configured relying party, stores the credential with the supplied
        nickname, and clears the cookie. Requires an authenticated session.
      parameters:
      - description: Attestation response plus nickname
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_passkey.registerFinishRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_passkey.credentialEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Finish passkey registration
      tags:
      - passkeys
schemes:
- http
- https
securityDefinitions:
  AdminKey:
    in: header
    name: X-Admin-Key
    type: apiKey
  CSRF:
    in: header
    name: X-CSRF-Token
    type: apiKey
swagger: "2.0"
