  /auth/passkey/login/begin:
    post:
      consumes:
      - application/json
      description: Returns WebAuthn CredentialRequestOptions and sets the cid_wa ceremony
        cookie. When an email is supplied the options carry an allow-list of that
        account's credentials; when omitted a discoverable (usernameless) ceremony
        is issued. An optional loginChallenge is carried to continue an in-progress
        OIDC login. Pre-auth.
      parameters:
      - description: Optional email (allow-list) and loginChallenge
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_passkey.loginBeginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.CredentialAssertion'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Begin passkey login
      tags:
      - passkeys
  /auth/passkey/login/finish:
    post:
      consumes:
      - application/json
      description: Verifies the assertion against the cid_wa ceremony cookie and the
        configured relying party, rejects a non-increasing sign counter as a possible
        cloned authenticator, resolves the account, refuses non-active accounts, establishes
        a cotton-id session (same cookie as password login), and either accepts the
        carried Hydra login challenge (returning {redirectTo}) or returns {user}.
        Pre-auth.
      parameters:
      - description: Assertion response
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_passkey.loginFinishRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_passkey.loginFinishResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Finish passkey login
      tags:
      - passkeys
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Always responds 202 with a generic message; never reveals whether
        the email is registered.
      parameters:
