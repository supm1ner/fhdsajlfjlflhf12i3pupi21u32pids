          $ref: '#/definitions/internal_auth.resetRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: Reset a password
