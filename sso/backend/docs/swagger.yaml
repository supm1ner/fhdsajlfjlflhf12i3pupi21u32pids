  cotton-id_internal_httpx.Problem:
    properties:
      detail:
        description: Detail is a human-readable explanation specific to this occurrence.
        example: email is required
        type: string
      field:
        description: Field optionally names the offending request field for validation
          errors.
        example: email
        type: string
      instance:
        description: Instance optionally identifies the specific occurrence (the request
          path).
        type: string
      status:
        description: Status is the HTTP status code.
        example: 400
        type: integer
      title:
        description: Title is a short, human-readable summary of the problem type.
        example: Bad Request
        type: string
      type:
        description: |-
          Type is a URI reference identifying the problem type. "about:blank" is
          used when only the status conveys meaning.
        example: about:blank
        type: string
