      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_auth.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: Request a password reset
      tags:
      - auth
  /auth/password/reset:
    post:
