info:
  contact: {}
  description: 'cotton-id is a single-tenant OpenID Connect identity provider. This
    is the change-1 walking skeleton: email/password auth, sessions, and the OIDC
    login/consent surface (OIDC and admin-client routes are stubs in this change).'
  title: cotton-id API
  version: 0.1.0
paths:
  /account:
    delete:
      consumes:
      - application/json
      description: Permanently deletes the current user's account after re-authentication
        (the current password for password accounts, or confirm=true for social/passkey-only
        accounts). FK cascade removes sessions, passkeys, social identities, and profile
        images; the subject's Hydra login/consent sessions are best-effort revoked;
        the session cookie is cleared. Irreversible. Requires an authenticated session.
      parameters:
      - description: Re-auth material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_account.deleteAccountRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Delete account
      tags:
      - account
    get:
      description: Returns the current user's full profile (including avatar/banner
        URLs and preferences) plus session/passkey/connection counts for the security
        overview. Requires an authenticated session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.profileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Get account profile
      tags:
      - account
    patch:
      consumes:
      - application/json
      description: Updates the current user's display name, about, and location (validated
        and length-bounded). Requires an authenticated session.
      parameters:
      - description: Profile fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_account.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.userEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Update account profile
      tags:
      - account
  /account/connections:
    get:
      description: Returns the relying parties the current user has granted access
        to (client id/name + granted scopes), read from Hydra's consent sessions for
        the user's subject. Requires an authenticated session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.connectionsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: List connected apps
      tags:
      - account
  /account/connections/{client}:
    delete:
      description: Revokes the current user's consent for the given client, so the
        app must obtain consent again on its next authorization. Requires an authenticated
        session.
      parameters:
      - description: OAuth2 client id
        in: path
        name: client
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Revoke a connected app
      tags:
      - account
  /account/images/{kind}:
    get:
      description: Serves the current user's avatar or banner bytes with the stored
        content type. Auth-gated to the owner for now (a public cross-app URL is a
        later change). Requires an authenticated session.
      parameters:
      - description: Image kind
        enum:
        - avatar
        - banner
        in: path
        name: kind
        required: true
        type: string
      produces:
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Serve avatar or banner
      tags:
      - account
    put:
      consumes:
      - multipart/form-data
      description: Uploads the current user's avatar or banner as multipart/form-data
        (field "file"). The content type is validated by magic bytes (png/jpeg/webp
        only) and the size is capped (avatar ≤ 512 KiB, banner ≤ 1 MiB). The image
        is stored and the user's avatar/banner URL is set. Requires an authenticated
        session.
      parameters:
      - description: Image kind
        enum:
        - avatar
        - banner
        in: path
        name: kind
        required: true
        type: string
      - description: Image file (png, jpeg, or webp)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.userEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Upload avatar or banner
      tags:
      - account
  /account/password:
    put:
      consumes:
      - application/json
      description: 'Changes the current user''s password: verifies the current password,
        enforces the password policy on the new one, rehashes, and revokes the user''s
        other sessions (the current device stays signed in). Requires an authenticated
        session.'
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_account.changePasswordRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Change password
      tags:
      - account
  /account/preferences:
    patch:
      consumes:
      - application/json
      description: Updates the current user's theme (dark|light|system), language
        (ru|en), and login-notification toggle. Persisted server-side so they sync
        across devices. Requires an authenticated session.
      parameters:
      - description: Preferences
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_account.updatePreferencesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.userEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Update preferences
      tags:
      - account
  /account/sessions:
    delete:
      description: Revokes all of the current user's sessions except the request's
        own (so the current device stays signed in). Requires an authenticated session.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Revoke other sessions
      tags:
      - account
    get:
      description: Returns the current user's active sessions (id, user agent, ip,
        created/expires timestamps), flagging the request's own session as current.
        Requires an authenticated session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_account.sessionsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: List active sessions
      tags:
      - account
  /account/sessions/{id}:
    delete:
      description: Revokes one of the current user's sessions by its id (scoped to
        the user). Returns 404 if the session does not exist or belongs to another
        account. Requires an authenticated session.
      parameters:
      - description: Session id (sha256 hex)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Revoke a session
      tags:
      - account
  /admin/audit:
    get:
      description: Returns audit entries newest-first, with optional actor/action/time-range
        filters and pagination. Requires an admin/owner session.
      parameters:
      - description: 'filter by actor: an exact actor id (uuid) or a case-insensitive
          actor-label substring'
        in: query
        name: actor
        type: string
      - description: filter by action (e.g. auth.login.ok)
        in: query
        name: action
        type: string
      - description: filter by target type (e.g. user, client, session)
        in: query
        name: targetType
        type: string
      - description: filter by target id (the affected entity's id)
        in: query
        name: targetId
        type: string
      - description: lower time bound (RFC3339, inclusive)
        in: query
        name: from
        type: string
      - description: upper time bound (RFC3339, exclusive)
        in: query
        name: to
        type: string
      - description: 1-based page number
        in: query
        name: page
        type: integer
      - description: page size (max 200)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.auditResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Query the audit log (Journal)
      tags:
      - admin-console
  /admin/clients:
    get:
      description: Lists the registered relying-party clients. Secrets are never returned.
        Requires the X-Admin-Key header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adminapi.listClientsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - AdminKey: []
      summary: List OAuth2 clients
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Creates a relying-party client in Hydra. Returns the generated
        clientId, plus a clientSecret for confidential clients (shown once). Requires
        the X-Admin-Key header.
      parameters:
      - description: Client to register
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adminapi.registerClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_adminapi.registerClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - AdminKey: []
      summary: Register an OAuth2 client
      tags:
      - admin
  /admin/clients/{id}:
    delete:
      description: Removes a relying-party client from Hydra. Subsequent authorization
        requests for that clientId are rejected. Idempotent. Requires the X-Admin-Key
        header.
      parameters:
      - description: Client id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - AdminKey: []
      summary: Delete an OAuth2 client
      tags:
      - admin
  /admin/overview:
    get:
      description: Returns total accounts, active-today, new-this-week, registered
        services count, a 30-day daily sign-up series, recent sign-ups, and a recent
        activity feed. Requires an admin/owner session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.overviewResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Admin overview metrics
      tags:
      - admin-console
  /admin/services:
    get:
      description: Lists the registered relying-party clients with id, name, type
        (public/confidential), redirect URIs, scopes, and grant/response types. Secrets
        are never returned. Requires an admin/owner session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.servicesListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: List services (OAuth clients)
      tags:
      - admin-console
    post:
      consumes:
      - application/json
      description: Registers a relying-party client. Returns the generated clientId,
        plus a clientSecret for confidential clients shown EXACTLY ONCE (never re-served).
        Invalid redirect URIs (non-absolute or containing a fragment) are rejected.
        Audited. Requires an admin/owner session.
      parameters:
      - description: Service to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/cotton-id_internal_adminapi.RegisterClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_admin.createServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Create a service (OAuth client)
      tags:
      - admin-console
  /admin/services/{id}:
    delete:
      description: Removes a relying-party client. Subsequent authorization requests
        for that clientId are rejected. Idempotent. Audited. Requires an admin/owner
        session.
      parameters:
      - description: client id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Delete a service (OAuth client)
      tags:
      - admin-console
    get:
      description: Returns a single relying-party client's id, name, type, redirect
        URIs, scopes, and grant/response types. The secret is never returned (shown
        only once on create). Requires an admin/owner session.
      parameters:
      - description: client id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.serviceDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Service detail
      tags:
      - admin-console
    patch:
      consumes:
      - application/json
      description: Updates a relying-party client's name, redirect URIs, scopes, and/or
        grant/response types. Omitted fields are left unchanged. Invalid redirect
        URIs are rejected. A public↔confidential type change is rejected (clientType,
        if sent, must match the existing type). Audited. Requires an admin/owner session.
      parameters:
      - description: client id
        in: path
        name: id
        required: true
        type: string
      - description: fields to change
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_admin.updateServiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.serviceDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Edit a service (OAuth client)
      tags:
      - admin-console
  /admin/services/{id}/consents:
    delete:
      description: 'Revokes the client''s consent grants so its users must consent
        again on next authorization. BEST-EFFORT: Hydra v2.2.0 has no client-only
        revoke, so this revokes per subject across the IdP''s subjects (capped); complete=false
        means some subjects beyond the cap were not processed. Audited. Requires an
        admin/owner session.'
      parameters:
      - description: client id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.revokeServiceConsentsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      security:
      - CSRF: []
      summary: Revoke a service's consents (best-effort)
      tags:
      - admin-console
    get:
      description: 'Returns the number of users who have an active consent grant for
        the client. BEST-EFFORT: Hydra v2.2.0 exposes no per-client consent query,
        so the count is derived by scanning the IdP''s subjects (capped); complete=false
        means the count is a lower bound. Requires an admin/owner session.'
      parameters:
