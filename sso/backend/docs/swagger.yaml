        type: string
      responses:
        "302":
          description: Redirect to the provider authorization endpoint
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/cotton-id_internal_httpx.Problem'
      summary: Start social login
      tags:
      - social
