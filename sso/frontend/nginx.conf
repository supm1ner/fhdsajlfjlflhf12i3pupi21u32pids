# ─────────────────────────────────────────────────────────────────────────────
# cotton-id frontend — nginx site config
#
# Serves the built Vite SPA and reverse-proxies the backend API prefixes so the
# browser only ever talks to a single same-origin host (contract §7). Same-origin
# is what makes the SameSite=Lax session cookie + double-submit CSRF scheme work
# without cross-site complications (design.md D5).
#
# NOTE (infra agent): this file is a sensible default authored by the infra slice
# because the frontend slice had not committed a nginx.conf at build time. If the
# frontend agent ships its own, theirs is authoritative; keep the proxy prefixes
# (/api, /oauth, /healthz, /swagger) and the SPA history fallback below.
# ─────────────────────────────────────────────────────────────────────────────

# `backend` is the compose service name; Docker's embedded DNS resolves it on
# the internal network. Port 8080 per contract §6.
upstream cotton_backend {
    server backend:8080;
    keepalive 16;
}

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Don't advertise the nginx version.
    server_tokens off;

    # Reasonable upload ceiling for auth/admin JSON bodies.
    client_max_body_size 1m;

    # gzip text assets; images/fonts are already compressed.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/javascript application/xml image/svg+xml;

    # ---- Backend reverse proxy ----------------------------------------------
    # All API / OIDC / ops prefixes go to the Go backend. Cookies and the
    # X-CSRF-Token header pass through unchanged (same origin → no CORS dance).
    location /api/ {
        proxy_pass         http://cotton_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Browser-redirect OIDC endpoints (/oauth/login, /oauth/consent, /oauth/logout).
    location /oauth/ {
        proxy_pass         http://cotton_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Liveness/readiness probe is proxied so external monitors can hit it here.
    location = /healthz {
        proxy_pass         http://cotton_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Swagger UI + the OpenAPI document.
    location /swagger/ {
        proxy_pass         http://cotton_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ---- Static SPA ----------------------------------------------------------
    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA history fallback: any unmatched path serves index.html so client-side
    # routing (/login, /signup, /consent, …) works on hard reload (contract §7).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
